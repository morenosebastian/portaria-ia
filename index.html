<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PorterIA 5.0</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,700;0,800;1,400&display=swap" rel="stylesheet">

    <style>
        :root {
            --intelbras-green: #00a335;
            --intelbras-dark-green: #00852b;
            --bg-dark: #0f0f0f;
            --text-main: #ffffff;
            --font-family: 'Montserrat', sans-serif;
        }

        body {
            margin: 0;
            background: var(--bg-dark);
            color: var(--text-main);
            font-family: var(--font-family);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-weight: 800;
            margin: 0;
            letter-spacing: 6px;
            font-size: 52px;
            text-transform: uppercase;
        }

        .header h1 span {
            color: var(--intelbras-green);
        }

        .orb-wrapper {
            position: relative;
            width: 180px;
            height: 180px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nebula {
            position: absolute;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--intelbras-green);
            filter: blur(50px);
            opacity: .2;
            transition: .6s;
        }

        .listening .nebula {
            opacity: .6;
            width: 140px;
            filter: blur(60px);
        }

        .speaking .nebula {
            opacity: .9;
            width: 180px;
            filter: blur(70px);
            animation: pulse .8s infinite alternate;
        }

        @keyframes pulse {
            from {
                transform: scale(.95)
            }

            to {
                transform: scale(1.1)
            }
        }

        .btn-3d {
            font-family: var(--font-family);
            font-weight: 700;
            font-size: 16px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: white;
            background: var(--intelbras-green);
            border: none;
            border-radius: 14px;
            padding: 22px 50px;
            cursor: pointer;
            box-shadow: 0 8px 0 var(--intelbras-dark-green), 0 15px 25px rgba(0, 0, 0, .6);
            min-width: 280px;
        }

        .btn-3d.active {
            background: #121212;
            color: var(--intelbras-green);
            border: 2px solid var(--intelbras-green);
        }

        #status-container {
            margin-top: 40px;
            text-align: center;
            max-width: 340px;
            min-height: 100px;
        }

        .user-talk {
            font-size: 14px;
            color: #888;
            display: block;
            margin-bottom: 10px;
            font-style: italic;
        }

        .ia-response {
            color: var(--intelbras-green);
            font-style: italic;
            display: block;
        }

        .footer {
            position: absolute;
            bottom: 15px;
            font-size: 9px;
            color: #333;
            letter-spacing: 2px;
            font-weight: 700;
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>PORTER<span>IA</span></h1>
    </div>

    <div id="visualizer" class="orb-wrapper">
        <div class="nebula"></div>
    </div>

    <button id="btnMain" class="btn-3d">Portaria</button>

    <div id="status-container">
        <div id="output">
            <span style="color:#555;font-style:italic;">Aguardando comando...</span>
        </div>
    </div>

    <div class="footer">EAG SOLUÇÕES EM NUVEM</div>

    <audio id="ttsAudio"></audio>

    <script>

        const API_KEY = "d9560456-63de-4159-9119-2bc91433c7c8";
        const AGENT_ID = "agent_d6cdca0a-b0c6-434a-aa32-b24cf94de34b";
        const API_URL = `https://wide.intelbrasia.com.br/intelbrasia/api/agent/${AGENT_ID}`;

        let chatHistory = [];
        let isRunning = false;

        const btnMain = document.getElementById("btnMain");
        const outputText = document.getElementById("output");
        const visualizer = document.getElementById("visualizer");
        const audioPlayer = document.getElementById("ttsAudio");

        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();

        recognition.lang = "pt-BR";
        recognition.continuous = true;
        recognition.interimResults = false;

        btnMain.onclick = () => {

            if (!isRunning) {

                isRunning = true;
                btnMain.innerText = "Portaria Online";
                btnMain.classList.add("active");

                recognition.start();

            }

        };

        recognition.onstart = () => {

            visualizer.className = "orb-wrapper listening";

            outputText.innerHTML = `<span style="color:#777;font-style:italic;">Escutando...</span>`;

        };

        recognition.onresult = async (event) => {

            const userText = event.results[event.results.length - 1][0].transcript;

            visualizer.className = "orb-wrapper";

            outputText.innerHTML = `<span class="user-talk">"${userText}"</span>`;

            processAI(userText);

        };

        recognition.onerror = () => { };

        recognition.onend = () => {

            if (isRunning) {

                try {

                    recognition.start();

                } catch (e) { }

            }

        };

        async function processAI(query) {

            try {

                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: {
                        Authorization: API_KEY,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        history: chatHistory,
                        query: query,
                        tts: true,
                        voice_priority: true
                    })
                });

                const data = await response.json();

                if (data.status === 0) {

                    chatHistory = data.history;

                    const reply = data.response || data.answer || "";

                    outputText.innerHTML += `<span class="ia-response">${reply}</span>`;

                    if (data.tts_audio_mp3_encoded_base64) {

                        playResponse(data.tts_audio_mp3_encoded_base64);

                    }

                }

            } catch (e) {

                outputText.innerText = "Erro na conexão...";

            }

        }

        function playResponse(base64) {

            visualizer.className = "orb-wrapper speaking";

            audioPlayer.src = `data:audio/mp3;base64,${base64}`;

            audioPlayer.play();

            audioPlayer.onended = () => {

                visualizer.className = "orb-wrapper listening";

            };

        }

    </script>

</body>

</html>
